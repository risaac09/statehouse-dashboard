name: Refresh legislative data

on:
  schedule:
    - cron: '0 13 * * *'   # daily at 13:00 UTC
  workflow_dispatch:
    inputs:
      states:
        description: 'Space- or comma-separated state codes (e.g. "ri ma ct")'
        required: false
        default: 'ri'

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and clean data
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STATES: ${{ github.event.inputs.states || vars.STATES || 'ri' }}
        run: node scripts/fetch.mjs

      - name: Run tests
        run: node scripts/test.mjs

      - name: Commit if changed
        run: |
          git config user.name "statehouse-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh legislative snapshots ($(date -u +%Y-%m-%d))"
            git push
          fi

      # A failed refresh means the public dashboard serves stale data
      # silently (commits only happen on change, so absence of commits
      # is not a signal). Open an issue instead of failing quietly.
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Scheduled data refresh failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `The scheduled legislative data refresh failed on ${new Date().toISOString().slice(0, 10)}.\n\nRun: ${runUrl}\n\nThe dashboard keeps serving its last good data while this is broken, so nothing looks wrong from the outside. First things to check: the OpenStates API key (revoked or rate-limited), then the fetch/normalize logs in the run.`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
